blueprint:
  name: Netro Weather Sync Script
  description: >
    Synchronizes weather data from a weather entity to a Netro controller.
    This script retrieves daily weather forecasts and transmits them to the controller
    to optimize watering schedules.
    For today, real-time station sensors (if configured) override ARPAE forecasts.
  
  source_url: https://github.com/kcofoni/ha-netro-watering/blob/main/blueprints/script/kcofoni/netro_weather_sync.yaml
  
  domain: script
  
  input:
    netro_controller:
      name: Netro Controller
      description: Select the Netro controller config entry to synchronize
      selector:
        config_entry:
          integration: netro_watering
          
    weather_entity:
      name: Weather Entity
      description: Select the source weather entity (e.g. weather.stazione_meteocarpi)
      selector:
        entity:
          domain: weather
          
    rain_probability_entity:
      name: Rain Probability Entity (Optional)
      description: Sensor entity for rain probability if available
      default: ""
      selector:
        entity:
          domain: sensor

    rain_today_entity:
      name: Daily Rain Sensor (Optional)
      description: >
        Sensor for actual rainfall today in mm (e.g. sensor.pioggia_giornaliera).
        Overrides forecast precipitation for today's report.
      default: ""
      selector:
        entity:
          domain: sensor

    temp_min_entity:
      name: Daily Min Temperature Sensor (Optional)
      description: >
        Sensor for today's measured minimum temperature (e.g. sensor.temperatura_min_giornaliera).
        Overrides forecast templow for today's report.
      default: ""
      selector:
        entity:
          domain: sensor

    temp_max_entity:
      name: Daily Max Temperature Sensor (Optional)
      description: >
        Sensor for today's measured maximum temperature (e.g. sensor.temperatura_max_giornaliera).
        Overrides forecast temperature for today's report.
      default: ""
      selector:
        entity:
          domain: sensor

variables:
  weather_entity_id: !input weather_entity
  rain_prob_entity: !input rain_probability_entity
  rain_today_entity: !input rain_today_entity
  temp_min_entity: !input temp_min_entity
  temp_max_entity: !input temp_max_entity
  config_entry_controller: !input netro_controller

fields:
  number_of_days_forecast:
    name: Number of Forecast Days
    description: Number of forecast days to synchronize (in addition to today)
    required: true
    default: 4
    selector:
      number:
        min: 0
        max: 7
        mode: slider

sequence:
  - alias: "Get weather forecasts"
    action: weather.get_forecasts
    target:
      entity_id: "{{ weather_entity_id }}"
    data:
      type: daily
    response_variable: myforecasts
    
  - alias: "Sync today's weather (station data overrides forecasts)"
    action: netro_watering.report_weather
    data:
      config_entry_id: "{{ config_entry_controller }}"
      date: >
        {{ now().strftime("%Y-%m-%d") }}
      condition: >
        {% set mapped_conditions = {
          'clear-night': 'clear', 'cloudy': 'cloudy', 'exceptional': 'clear',
          'fog': 'cloudy', 'hail': 'rain', 'lightning': 'rain',
          'lightning-rainy': 'rain', 'partlycloudy': 'cloudy', 'pouring': 'rain',
          'rainy': 'rain', 'snowy': 'snow', 'snowy-rainy': 'snow',
          'sunny': 'clear', 'windy': 'wind', 'windy-variant': 'wind'
        } %}
        {% set current_condition = states(weather_entity_id) %}
        {{ mapped_conditions.get(current_condition, 'clear') }}
      rain: >
        {% set forecast_rain = myforecasts[weather_entity_id]['forecast'][0].precipitation | default(0) | float(0) %}
        {% if rain_today_entity != "" %}
          {% set sensor_rain = states(rain_today_entity) | float(0) %}
          {% if sensor_rain > forecast_rain %}
            {{ sensor_rain }}
          {% elif now().hour >= 20 %}
            {{ sensor_rain }}
          {% else %}
            {{ forecast_rain }}
          {% endif %}
        {% else %}
          {{ forecast_rain }}
        {% endif %}
      t_min: >
        {% if temp_min_entity != "" %}
          {{ states(temp_min_entity) | float }}
        {% else %}
          {{ myforecasts[weather_entity_id]['forecast'][0].templow }}
        {% endif %}
      t_max: >
        {% if temp_max_entity != "" %}
          {{ states(temp_max_entity) | float }}
        {% else %}
          {{ myforecasts[weather_entity_id]['forecast'][0].temperature }}
        {% endif %}
      humidity: >
        {{ state_attr(weather_entity_id, 'humidity') }}
      rain_prob: >
        {% if rain_prob_entity != "" %}
          {{ states(rain_prob_entity) | int(0) }}
        {% elif myforecasts[weather_entity_id]['forecast'][0].precipitation_probability is defined %}
          {{ myforecasts[weather_entity_id]['forecast'][0].precipitation_probability | int(0) }}
        {% else %}
          {{ state_attr(weather_entity_id, 'humidity') | default(50) | int }}
        {% endif %}
      temp: >
        {{ state_attr(weather_entity_id, 'temperature') }}
      wind_speed: >
        {{ (state_attr(weather_entity_id, 'wind_speed') | float / 3.6) | round(1) }}
      pressure: >
        {{ state_attr(weather_entity_id, 'pressure') }}
      t_dew: >
        {{ state_attr(weather_entity_id, 'dew_point') }}
        
  - alias: "Sync forecast days"
    repeat:
      count: "{{ [number_of_days_forecast, myforecasts[weather_entity_id]['forecast'] | length - 1] | min }}"
      sequence:
        - action: netro_watering.report_weather
          data:
            config_entry_id: "{{ config_entry_controller }}"
            date: >
              {{ as_timestamp(myforecasts[weather_entity_id]['forecast'][repeat.index].datetime, now()) | timestamp_custom("%Y-%m-%d") }}
            condition: >
              {% set mapped_conditions = {
                'clear-night': 'clear', 'cloudy': 'cloudy', 'exceptional': 'clear',
                'fog': 'cloudy', 'hail': 'rain', 'lightning': 'rain',
                'lightning-rainy': 'rain', 'partlycloudy': 'cloudy', 'pouring': 'rain',
                'rainy': 'rain', 'snowy': 'snow', 'snowy-rainy': 'snow',
                'sunny': 'clear', 'windy': 'wind', 'windy-variant': 'wind'
              } %}
              {% set current_condition = myforecasts[weather_entity_id]['forecast'][repeat.index].condition %}
              {{ mapped_conditions.get(current_condition, 'clear') }}
            rain: >
              {% if myforecasts[weather_entity_id]['forecast'][repeat.index].precipitation is defined %}
                {{ myforecasts[weather_entity_id]['forecast'][repeat.index].precipitation }}
              {% else %}
                0
              {% endif %}
            t_min: >
              {{ myforecasts[weather_entity_id]['forecast'][repeat.index].templow }}
            t_max: >
              {{ myforecasts[weather_entity_id]['forecast'][repeat.index].temperature }}
            rain_prob: >
              {% if myforecasts[weather_entity_id]['forecast'][repeat.index].precipitation_probability is defined %}
                {{ myforecasts[weather_entity_id]['forecast'][repeat.index].precipitation_probability | int(0) }}
              {% else %}
                50
              {% endif %}

mode: single
icon: mdi:cloud-arrow-down-outline